<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>N64 Discman - Auto-Rotate Edition</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            font-family: 'Courier New', Courier, monospace; 
        }
        
        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            image-rendering: pixelated;
        }

        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; 
            flex-direction: column; align-items: center; justify-content: space-between; 
            padding: 40px 0; box-sizing: border-box;
        }
        
        #search-container { pointer-events: auto; }
        input {
            padding: 10px; border: 4px solid #fff; border-radius: 0;
            width: 300px; background: #0000aa; color: #fff; outline: none;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 1rem; 
            text-align: center; text-transform: uppercase;
        }

        #track-info {
            background: #000; border: 4px solid #fff; padding: 15px 30px; 
            text-align: center; color: #fff; pointer-events: auto;
            opacity: 0; transition: 0.1s;
        }
        #track-info.active { opacity: 1; }
        h2 { margin: 0; font-size: 1.2rem; color: #ffff00; text-transform: uppercase; }
        p { margin: 5px 0 0; color: #aaa; font-size: 0.9rem; text-transform: uppercase; }
        
        #hint { position: absolute; bottom: 10px; left: 10px; color: #fff; font-size: 0.8rem; background: #000; padding: 5px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="search-container">
            <input type="text" id="songInput" placeholder="INSERT CD...">
        </div>
        <div id="track-info">
            <h2 id="title">TRACK 01</h2>
            <p id="artist">ARTIST</p>
        </div>
    </div>
    <div id="hint">MOUSE: ORBIT | DBLCLICK: OPEN LID</div>

    <audio id="player"></audio>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const RENDER_W = 320;
        const RENDER_H = 240;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xECECEC);
        
        const camera = new THREE.PerspectiveCamera(50, RENDER_W / RENDER_H, 0.1, 100);
        camera.position.set(0, 5, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: false }); 
        renderer.setSize(RENDER_W, RENDER_H, false);
        document.body.appendChild(renderer.domElement);

        // --- CONTROLES CON GIRO AUTOMÁTICO ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;        // Activa el giro lento
        controls.autoRotateSpeed = 1.0;    // Velocidad del giro
        controls.enablePan = false;        // Opcional: evita desplazar la cámara para mantener el centro

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const matPlastic = new THREE.MeshLambertMaterial({color: 0x444444, flatShading: true});
        const matDark = new THREE.MeshLambertMaterial({color: 0x111111, flatShading: true});
        const matMetal = new THREE.MeshLambertMaterial({color: 0x999999, flatShading: true});

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(2.6, 2.6, 0.4, 16), matPlastic);
        playerGroup.add(baseMesh);

        const innerTray = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 2.4, 0.35, 16), matDark);
        innerTray.position.y = 0.05;
        playerGroup.add(innerTray);

        const spindleGroup = new THREE.Group();
        spindleGroup.position.y = 0.25;
        playerGroup.add(spindleGroup);
        spindleGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.08, 8), matMetal));

        const cdGroup = new THREE.Group();
        cdGroup.position.y = 0.28;
        playerGroup.add(cdGroup);

        const cdMaterials = [
            matDark, 
            new THREE.MeshLambertMaterial({color: 0xffffff}), 
            matMetal
        ];
        const cdMesh = new THREE.Mesh(new THREE.CylinderGeometry(2.3, 2.3, 0.01, 16), cdMaterials);
        cdGroup.add(cdMesh);

        // --- TAPA ---
        const lidPivot = new THREE.Group();
        lidPivot.position.set(0, 0.2, -2.5);
        playerGroup.add(lidPivot);

        const lidContent = new THREE.Group();
        lidContent.position.set(0, 0, 2.5);
        lidPivot.add(lidContent);

        const lidRim = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.1, 8, 16), matPlastic);
        lidRim.rotation.x = Math.PI / 2;
        lidContent.add(lidRim);

        const glassMat = new THREE.MeshLambertMaterial({color: 0x222222, transparent: true, opacity: 0.5, flatShading: true});
        const lidGlass = new THREE.Mesh(new THREE.CylinderGeometry(2.45, 2.45, 0.04, 16), glassMat);
        lidContent.add(lidGlass);

        const panel = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 0.8), matPlastic);
        panel.position.set(0, -0.05, 2.6);
        panel.rotation.x = -Math.PI / 12;
        playerGroup.add(panel);
        
        const screen = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.25), new THREE.MeshLambertMaterial({color: 0x00ff00}));
        screen.position.set(-0.5, 0.16, 3.01);
        screen.rotation.x = -Math.PI / 12;
        playerGroup.add(screen);

        const audio = document.getElementById('player');
        const input = document.getElementById('songInput');
        let isPlaying = false, isLidOpen = false, targetLidRot = 0;

        window.addEventListener('dblclick', (e) => {
            if(e.target.tagName !== 'INPUT') {
                isLidOpen = !isLidOpen;
                targetLidRot = isLidOpen ? -Math.PI / 2.5 : 0;
            }
        });

        async function fetchMusic(query) {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`);
            const data = await res.json();
            if (data.results.length > 0) {
                const track = data.results[0];
                isLidOpen = true;
                targetLidRot = -Math.PI / 2.5;

                new THREE.TextureLoader().load(track.artworkUrl100, (tex) => {
                    tex.magFilter = tex.minFilter = THREE.NearestFilter;
                    cdMesh.material[1].map = tex;
                    cdMesh.material[1].needsUpdate = true;
                });

                document.getElementById('title').innerText = track.trackName;
                document.getElementById('artist').innerText = track.artistName;
                document.getElementById('track-info').classList.add('active');
                audio.src = track.previewUrl;
                
                setTimeout(() => {
                    isLidOpen = false;
                    targetLidRot = 0;
                    setTimeout(() => { audio.play(); isPlaying = true; }, 500);
                }, 1500);
            }
        }

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchMusic(input.value); });

        function animate() {
            requestAnimationFrame(animate);
            
            // Importante: llamar a update() para que el autoRotate funcione
            controls.update();
            
            lidPivot.rotation.x += (targetLidRot - lidPivot.rotation.x) * 0.15;
            
            if (isPlaying && !isLidOpen) {
                cdGroup.rotation.y -= 0.2; 
                spindleGroup.rotation.y -= 0.2;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
